<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Deutsch">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
  <title>Deutsch A1→B2</title>
</head>
<body>

<div id="app">
  <div id="content"></div>

  <!-- Bottom navigation -->
  <nav id="nav">
    <button class="nav-btn active" data-view="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Główna
    </button>
    <button class="nav-btn" data-view="lesson">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      Lekcja
    </button>
    <button class="nav-btn" data-view="review">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      Powtórki
    </button>
    <button class="nav-btn" data-view="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Postęp
    </button>
  </nav>

  <!-- Test overlay -->
  <div id="test-overlay" class="hidden">
    <div class="test-header">
      <button onclick="closeTest(true)" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px 4px 0">✕</button>
      <span id="test-header-info" style="flex:1"></span>
    </div>
    <div class="progress-wrap" style="border-radius:0;height:4px">
      <div id="test-progress" class="progress-bar" style="width:0%;border-radius:0;transition:width .3s"></div>
    </div>
    <div id="test-body" class="test-body"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/srs.js"></script>
<script src="js/progress.js"></script>
<script src="js/app.js"></script>
</body>
</html>
